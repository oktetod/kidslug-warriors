<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="robots" content="noindex, nofollow, noarchive, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="description" content="" />
    <title>Kid Slug Warriors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
      * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
      html, body { width:100%; height:100%; overflow:hidden; background:#050510; }
      body { touch-action:none; }
      canvas { touch-action:none; display:block; }
      #loading {
        position:fixed; inset:0; background:#050510;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        z-index:9999; transition:opacity 0.4s ease;
      }
      #loading h1 { font-family:'Press Start 2P',monospace; font-size:clamp(14px,4vw,22px); color:#ffd700; margin-bottom:12px; letter-spacing:3px; }
      #loading p  { font-family:monospace; font-size:12px; color:#444; margin-bottom:24px; letter-spacing:2px; }
      #loading-bar { width:220px; height:8px; background:#0f0f1a; border-radius:4px; overflow:hidden; }
      #loading-fill { height:100%; width:0%; background:#ffd700; border-radius:4px; animation:loadfill 2.4s ease-out forwards; }
      @keyframes loadfill { 0%{width:0%} 60%{width:75%} 100%{width:100%} }
    </style>
  </head>
  <body>
    <div id="loading">
      <h1>KID SLUG WARRIORS</h1>
      <p>LOADING...</p>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>
    <canvas id="gameCanvas" style="width:100%;height:100%;"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
